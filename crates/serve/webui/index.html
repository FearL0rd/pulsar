<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#f5f4ed" />
<title>Pulsar</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<script>
  try {
    document.documentElement.dataset.theme =
      localStorage.getItem("pulsar-theme") === "dark" ? "dark" : "light";
  } catch {
    document.documentElement.dataset.theme = "light";
  }
</script>
<style>
  :root {
    color-scheme: light;
    --parchment: #f5f4ed;
    --ivory: #faf9f5;
    --white: #ffffff;
    --sand: #e8e6dc;
    --border: #f0eee6;
    --border-strong: #e8e6dc;
    --ring: #d1cfc5;
    --ring-deep: #c2c0b6;
    --text: #141413;
    --text-secondary: #5e5d59;
    --text-tertiary: #87867f;
    --text-warm: #4d4c48;
    --accent: #c96442;
    --accent-hover: #b95436;
    --coral: #d97757;
    --focus: #3898ec;
    --danger: #b53333;
    --danger-soft: #f3e6e1;
    --dark: #141413;
    --dark-surface: #30302e;
    --warm-silver: #b0aea5;
    --chrome: rgba(250, 249, 245, .96);
    --button-hover: #dfddd2;
    --selection-bg: #ead5c9;
    --whisper: rgba(20, 20, 19, .04);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    --serif: Georgia, "Times New Roman", serif;
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --parchment: #141413;
    --ivory: #232321;
    --white: #30302e;
    --sand: #30302e;
    --border: #30302e;
    --border-strong: #3d3d3a;
    --ring: #4d4c48;
    --ring-deep: #5e5d59;
    --text: #faf9f5;
    --text-secondary: #b0aea5;
    --text-tertiary: #87867f;
    --text-warm: #e8e6dc;
    --accent-hover: #d97757;
    --danger: #d97757;
    --danger-soft: #3d2924;
    --dark: #141413;
    --dark-surface: #30302e;
    --chrome: rgba(20, 20, 19, .96);
    --button-hover: #3d3d3a;
    --selection-bg: #5e3a2d;
    --whisper: rgba(0, 0, 0, .22);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  html { background: var(--parchment); }
  body {
    background: var(--parchment);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection {
    color: var(--text);
    background: var(--selection-bg);
  }
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    min-height: 68px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--chrome);
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    min-width: 0;
  }
  .brand-copy {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }
  .logo {
    position: relative;
    width: 28px;
    height: 28px;
    border: 1px solid #d9b9a9;
    border-radius: 47% 53% 52% 48% / 43% 48% 52% 57%;
    background: var(--ivory);
    box-shadow: 0 0 0 1px rgba(201, 100, 66, .08);
    transform: rotate(-9deg);
    flex-shrink: 0;
  }
  .logo::before {
    content: "";
    position: absolute;
    width: 9px;
    height: 9px;
    left: 9px;
    top: 9px;
    border-radius: 55% 45% 52% 48%;
    background: var(--accent);
    transform: rotate(19deg);
  }
  .logo::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 8px;
    left: 4px;
    top: 8px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    transform: rotate(-29deg);
    opacity: .72;
  }
  header .title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    line-height: 1.2;
  }
  header .model {
    max-width: min(38vw, 430px);
    color: var(--text-tertiary);
    font-size: 12px;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  header .spacer { flex: 1; }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .status {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    max-width: 390px;
    padding: 5px 10px;
    overflow: hidden;
    color: var(--text-tertiary);
    background: var(--parchment);
    border-radius: 999px;
    box-shadow: 0 0 0 1px var(--border-strong);
    font-size: 11px;
    letter-spacing: .12px;
    line-height: 1.4;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .status::before {
    content: "";
    width: 6px;
    height: 6px;
    margin-right: 7px;
    border-radius: 50%;
    background: var(--ring-deep);
    flex-shrink: 0;
  }
  .status.busy { color: var(--text-warm); box-shadow: 0 0 0 1px #dbb5a7; }
  .status.busy::before { background: var(--accent); animation: breathe 1.5s ease-in-out infinite; }
  .status.err { color: var(--danger); box-shadow: 0 0 0 1px #d7a5a0; }
  .status.err::before { background: var(--danger); }

  button {
    min-height: 38px;
    padding: 8px 14px;
    border: 0;
    border-radius: var(--radius-sm);
    color: var(--text-warm);
    background: var(--sand);
    box-shadow: 0 0 0 1px var(--ring);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    line-height: 1;
    cursor: pointer;
    transition: background-color .15s ease, box-shadow .15s ease, color .15s ease, transform .15s ease;
  }
  button:hover { background: var(--button-hover); box-shadow: 0 0 0 1px var(--ring-deep); }
  button:active { transform: translateY(1px); box-shadow: inset 0 0 0 1px rgba(20, 20, 19, .1); }
  button:focus-visible { outline: none; box-shadow: 0 0 0 1px var(--text-warm), 0 0 0 3px var(--parchment); }
  button:disabled { opacity: .42; cursor: not-allowed; transform: none; }
  button.primary {
    min-width: 72px;
    background: var(--accent);
    color: #faf9f5;
    box-shadow: 0 0 0 1px var(--accent);
  }
  button.primary:hover { background: var(--accent-hover); box-shadow: 0 0 0 1px var(--accent-hover); }
  button.danger:hover { color: var(--danger); background: var(--danger-soft); box-shadow: 0 0 0 1px #d7a5a0; }
  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-width: 74px;
  }
  .theme-icon {
    width: 14px;
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 400;
    line-height: 1;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 40px 24px 48px;
    scroll-behavior: smooth;
    scrollbar-color: var(--ring) transparent;
    scrollbar-width: thin;
  }
  #messages::-webkit-scrollbar { width: 10px; }
  #messages::-webkit-scrollbar-thumb { background: var(--ring); border: 3px solid var(--parchment); border-radius: 99px; }
  .msg {
    display: flex;
    gap: 14px;
    max-width: 860px;
    margin: 0 auto 30px;
  }
  .msg .avatar {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    margin-top: 1px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .16px;
  }
  .msg.user .avatar { color: var(--text-warm); background: var(--sand); box-shadow: 0 0 0 1px var(--ring); }
  .msg.assistant .avatar {
    position: relative;
    overflow: hidden;
    color: var(--accent);
    background: var(--ivory);
    box-shadow: 0 0 0 1px #d9b9a9;
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 400;
  }
  .msg .bubble { flex: 1; min-width: 0; padding-top: 1px; }
  .msg.user .bubble {
    padding: 16px 18px;
    border-radius: var(--radius-lg);
    background: var(--ivory);
    box-shadow: 0 0 0 1px var(--border-strong);
  }
  .msg .role {
    margin-bottom: 6px;
    color: var(--text-tertiary);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .48px;
    line-height: 1.4;
    text-transform: uppercase;
  }
  .msg.assistant .role { color: var(--accent); }
  .msg .content {
    overflow-wrap: break-word;
    word-break: break-word;
    color: var(--text);
    font-size: 16px;
    line-height: 1.65;
  }
  .msg .content p { margin: 0 0 14px; }
  .msg .content p:last-child { margin-bottom: 0; }
  .msg .content p:has(+ .cursor) { display: inline; }
  .msg .content pre {
    margin: 14px 0;
    padding: 16px 18px;
    overflow-x: auto;
    color: #e8e6dc;
    background: var(--dark);
    border: 1px solid var(--dark-surface);
    border-radius: var(--radius-md);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    box-shadow: 0 0 0 1px rgba(20, 20, 19, .06);
    scrollbar-color: var(--text-secondary) transparent;
  }
  .msg .content code { font-family: var(--mono); font-size: .86em; }
  .msg .content :not(pre) > code {
    padding: 2px 5px;
    color: var(--text-warm);
    background: var(--sand);
    border-radius: 5px;
    box-shadow: 0 0 0 1px var(--border-strong);
  }
  .msg .content strong { font-weight: 650; }
  .msg .content a { color: var(--coral); text-decoration-color: #ddb09f; text-underline-offset: 3px; }
  .msg .content a:hover { color: var(--accent-hover); text-decoration-color: currentColor; }
  .msg .cursor {
    display: inline-block;
    width: 3px;
    height: 18px;
    margin-left: 3px;
    border-radius: 2px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes breathe { 50% { opacity: .35; transform: scale(.72); } }

  .empty {
    width: min(100%, 560px);
    margin: clamp(92px, 18vh, 180px) auto 0;
    padding: 0 20px;
    color: var(--text-secondary);
    text-align: center;
  }
  .empty .logo { width: 52px; height: 52px; margin: 0 auto 26px; }
  .empty .logo::before { width: 15px; height: 15px; left: 18px; top: 18px; }
  .empty .logo::after { width: 34px; height: 14px; left: 8px; top: 17px; }
  .empty-kicker {
    display: block;
    margin-bottom: 10px;
    color: var(--accent);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    line-height: 1.5;
    text-transform: uppercase;
  }
  .empty h2 {
    margin: 0 0 14px;
    color: var(--text);
    font-family: var(--serif);
    font-size: clamp(34px, 4vw, 44px);
    font-weight: 500;
    line-height: 1.12;
  }
  .empty p { max-width: 470px; margin: 0 auto; font-size: 14px; line-height: 1.65; }
  kbd {
    display: inline-block;
    min-width: 21px;
    padding: 1px 5px;
    color: var(--text-warm);
    background: var(--ivory);
    border-radius: 5px;
    box-shadow: 0 0 0 1px var(--ring);
    font-family: var(--sans);
    font-size: .86em;
    line-height: 1.5;
  }

  footer {
    padding: 10px 24px 22px;
    border-top: 1px solid var(--border);
    background: var(--chrome);
    flex-shrink: 0;
  }
  .compose { max-width: 860px; margin: 0 auto; }
  .compose-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px;
    border-radius: var(--radius-lg);
    background: var(--ivory);
    box-shadow: 0 0 0 1px var(--border-strong), 0 4px 24px var(--whisper);
  }
  textarea#input {
    flex: 1;
    min-height: 44px;
    max-height: 200px;
    padding: 10px 11px;
    resize: none;
    color: var(--text);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    outline: none;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.5;
    transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
  }
  textarea#input::placeholder { color: var(--text-tertiary); opacity: 1; }
  textarea#input:focus { background: var(--white); border-color: var(--focus); box-shadow: 0 0 0 1px var(--focus); }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    max-width: 860px;
    min-height: 36px;
    margin: 0 auto 7px;
    color: var(--text-tertiary);
    font-size: 11px;
    flex-wrap: wrap;
  }
  .toolbar details { position: relative; }
  .toolbar summary {
    min-height: 30px;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    background: transparent;
    box-shadow: 0 0 0 1px var(--border-strong);
    list-style: none;
    cursor: pointer;
    transition: background-color .15s ease, box-shadow .15s ease;
  }
  .toolbar summary::before { content: "\2699"; margin-right: 7px; color: var(--text-tertiary); }
  .toolbar summary::-webkit-details-marker { display: none; }
  .toolbar summary:hover, .toolbar details[open] summary { background: var(--sand); box-shadow: 0 0 0 1px var(--ring); }
  .toolbar summary:focus-visible { outline: none; box-shadow: 0 0 0 1px var(--text-warm), 0 0 0 3px var(--parchment); }
  .panel {
    position: absolute;
    bottom: 40px;
    left: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 13px;
    width: 290px;
    padding: 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--ivory);
    box-shadow: 0 0 0 1px var(--ring), 0 4px 24px var(--whisper);
  }
  .panel-title {
    padding-bottom: 11px;
    border-bottom: 1px solid var(--border-strong);
    color: var(--text);
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    line-height: 1.25;
  }
  .panel label { display: flex; flex-direction: column; gap: 6px; color: var(--text-secondary); font-size: 12px; }
  .field-label { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .panel input[type=number], .panel input[type=text], .panel textarea {
    width: 100%;
    padding: 8px 10px;
    color: var(--text);
    background: var(--white);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    outline: none;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.45;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .panel textarea { min-height: 72px; resize: vertical; }
  .panel input:focus, .panel textarea:focus { border-color: var(--focus); box-shadow: 0 0 0 1px var(--focus); }
  .hint { color: var(--text-tertiary); font-size: 11px; }

  :root[data-theme="dark"] .msg .content pre {
    color: var(--warm-silver);
    background: var(--dark-surface);
    border-color: var(--ring);
  }
  :root[data-theme="dark"] .logo { border-color: #8f5846; box-shadow: 0 0 0 1px rgba(201, 100, 66, .18); }
  :root[data-theme="dark"] .msg.assistant .avatar { box-shadow: 0 0 0 1px #8f5846; }
  :root[data-theme="dark"] .status.busy { box-shadow: 0 0 0 1px #8f5846; }
  :root[data-theme="dark"] .msg .content a { text-decoration-color: #8f5846; }

  @media (max-width: 720px) {
    header { min-height: 62px; padding: 10px 16px; gap: 10px; }
    .brand-copy { display: block; }
    header .title { display: block; font-size: 18px; }
    header .model { display: block; max-width: 34vw; font-size: 10px; }
    .header-actions { gap: 7px; }
    .status { max-width: 145px; min-height: 28px; padding: 4px 8px; }
    #messages { padding: 30px 16px 38px; }
    .msg { gap: 11px; margin-bottom: 26px; }
    .msg .avatar { width: 30px; height: 30px; }
    .msg.user .bubble { padding: 14px 15px; }
    footer { padding: 8px 16px 16px; }
  }

  @media (max-width: 479px) {
    header { padding-inline: 12px; }
    header .model { display: none; }
    .logo { width: 25px; height: 25px; }
    .logo::before { left: 8px; top: 8px; }
    .logo::after { width: 16px; left: 4px; top: 7px; }
    .status { max-width: 104px; }
    .theme-toggle { min-width: 34px; width: 34px; padding-inline: 0; }
    .theme-label { display: none; }
    .header-actions button { min-height: 34px; padding: 7px 10px; }
    #messages { padding: 24px 12px 30px; }
    .msg { gap: 9px; }
    .msg .content { font-size: 15px; }
    .empty { margin-top: clamp(70px, 14vh, 120px); padding-inline: 8px; }
    .empty h2 { font-size: 34px; }
    .empty p { font-size: 13px; }
    footer { padding: 7px 12px 12px; }
    .toolbar { min-height: 32px; margin-bottom: 5px; }
    .toolbar > .hint { display: none; }
    .panel { position: fixed; right: 12px; bottom: 96px; left: 12px; width: auto; max-height: calc(100vh - 130px); overflow-y: auto; }
    .compose-row { gap: 6px; padding: 6px; }
    textarea#input { min-height: 42px; padding: 9px 8px; font-size: 14px; }
    .compose-row button { min-width: auto; min-height: 42px; padding: 8px 11px; }
  }

  @media (max-width: 360px) {
    .status { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo" aria-hidden="true"></div>
    <div class="brand-copy">
      <span class="title">Pulsar</span>
      <span class="model" id="model">loading…</span>
    </div>
  </div>
  <span class="spacer"></span>
  <div class="header-actions">
    <span class="status" id="status">idle</span>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" title="Switch to dark mode">
      <span class="theme-icon" aria-hidden="true">☾</span>
      <span class="theme-label">Dark</span>
    </button>
    <button id="clear" class="danger" title="Clear conversation">Clear</button>
  </div>
</header>

<div id="messages">
  <div class="empty" id="empty">
    <div class="logo" aria-hidden="true"></div>
    <span class="empty-kicker">Local inference</span>
    <h2>Ready</h2>
    <p>Begin a conversation with the model running on this machine. <kbd>Enter</kbd> sends, <kbd>Shift+Enter</kbd> adds a new line.</p>
  </div>
</div>

<footer>
  <div class="toolbar">
    <details>
      <summary>Settings</summary>
      <div class="panel">
        <div class="panel-title">Generation settings</div>
        <label><span class="field-label">System prompt</span>
          <textarea id="system" placeholder="You are a helpful assistant."></textarea>
        </label>
        <label><span class="field-label">Temperature <span class="hint" id="temp-hint">0.8</span></span>
          <input type="number" id="temp" step="0.05" min="0" max="2" value="0.8" />
        </label>
        <label><span class="field-label">top_p</span>
          <input type="number" id="top-p" step="0.05" min="0" max="1" value="0.95" />
        </label>
        <label><span class="field-label">max_tokens</span>
          <input type="number" id="max-tokens" step="32" min="1" value="1024" />
        </label>
      </div>
    </details>
    <span class="hint"><kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline</span>
  </div>
  <div class="compose">
    <div class="compose-row">
      <textarea id="input" rows="1" placeholder="Send a message…" autofocus></textarea>
      <button id="send" class="primary">Send</button>
      <button id="stop" class="danger" disabled>Stop</button>
    </div>
  </div>
</footer>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages");
const inputEl = $("input");
const sendBtn = $("send");
const stopBtn = $("stop");
const clearBtn = $("clear");
const statusEl = $("status");
const modelEl = $("model");
const themeBtn = $("theme-toggle");
const themeMeta = document.querySelector('meta[name="theme-color"]');

let conversation = []; // {role, content}
let controller = null;

function applyTheme(theme, persist = true) {
  const dark = theme === "dark";
  document.documentElement.dataset.theme = dark ? "dark" : "light";
  themeBtn.querySelector(".theme-icon").textContent = dark ? "☀" : "☾";
  themeBtn.querySelector(".theme-label").textContent = dark ? "Light" : "Dark";
  themeBtn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
  themeBtn.setAttribute("aria-pressed", String(dark));
  themeBtn.title = dark ? "Switch to light mode" : "Switch to dark mode";
  themeMeta?.setAttribute("content", dark ? "#141413" : "#f5f4ed");
  if (persist) {
    try { localStorage.setItem("pulsar-theme", dark ? "dark" : "light"); } catch {}
  }
}

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = "status" + (cls ? " " + cls : "");
}

async function loadModel() {
  try {
    const r = await fetch("/v1/models");
    const j = await r.json();
    const id = j?.data?.[0]?.id;
    if (id) modelEl.textContent = id;
    else modelEl.textContent = "(no model)";
  } catch {
    modelEl.textContent = "(error)";
  }
}

function autoGrow() {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
}

function scrollDown() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  // Quotes must be escaped too: renderMarkdown drops matched URLs into an
  // href="..." attribute, so an unescaped " in model output could break
  // out of the attribute and inject an event handler (XSS). The URL regex
  // already hard-anchors on https?://, so the scheme stays safe.
  return s
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// Minimal markdown: fenced code blocks, inline code, bold, links, paragraphs.
function renderMarkdown(text) {
  const parts = [];
  const fence = /```(\w*)\n([\s\S]*?)```/g;
  let last = 0, m;
  while ((m = fence.exec(text)) !== null) {
    parts.push({ kind: "text", val: text.slice(last, m.index) });
    parts.push({ kind: "code", val: m[2].replace(/\n$/, "") });
    last = m.index + m[0].length;
  }
  parts.push({ kind: "text", val: text.slice(last) });

  return parts.map((p) => {
    if (p.kind === "code") {
      return "<pre><code>" + escapeHtml(p.val) + "</code></pre>";
    }
    let h = escapeHtml(p.val);
    // inline code
    h = h.replace(/`([^`\n]+)`/g, (_x, c) => "<code>" + c + "</code>");
    // bold
    h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    // links
    h = h.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // paragraphs + line breaks
    return h
      .split(/\n{2,}/)
      .map((para) => "<p>" + para.replace(/\n/g, "<br>") + "</p>")
      .join("");
  }).join("");
}

function addMessage(role, content) {
  $("empty")?.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg " + role;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "you" : "✦";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  const roleEl = document.createElement("div");
  roleEl.className = "role";
  roleEl.textContent = role === "user" ? "you" : "assistant";
  const body = document.createElement("div");
  body.className = "content";
  if (role === "user") {
    body.innerHTML = renderMarkdown(content);
  } else {
    body.innerHTML = content ? renderMarkdown(content) : '<span class="cursor"></span>';
  }
  bubble.appendChild(roleEl);
  bubble.appendChild(body);
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollDown();
  return body; // return content node for streaming updates
}

function getSettings() {
  const sys = $("system").value.trim();
  const messages = [];
  if (sys) messages.push({ role: "system", content: sys });
  for (const turn of conversation) messages.push(turn);
  return {
    messages,
    temperature: parseFloat($("temp").value) || 0.8,
    top_p: parseFloat($("top-p").value) || 0.95,
    max_tokens: parseInt($("max-tokens").value, 10) || 1024,
    stream: true,
  };
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || controller) return;
  conversation.push({ role: "user", content: text });
  addMessage("user", text);
  inputEl.value = "";
  autoGrow();
  await streamAssistant();
}

async function streamAssistant() {
  controller = new AbortController();
  sendBtn.disabled = true;
  stopBtn.disabled = false;
  setStatus("streaming", "busy");

  const body = document.createElement("div");
  body.className = "content";
  body.innerHTML = '<span class="cursor"></span>';
  // assistant bubble
  $("empty")?.remove();
  const wrap = document.createElement("div");
  wrap.className = "msg assistant";
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "✦";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  const roleEl = document.createElement("div");
  roleEl.className = "role";
  roleEl.textContent = "assistant";
  bubble.appendChild(roleEl);
  bubble.appendChild(body);
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollDown();

  let acc = "";
  let ntok = 0;
  let t0 = 0; // decode timer starts at first token, not at fetch (matches pulsar-cli)
  // Repaint throttle: rebuilding innerHTML per token is O(n²) and pins the
  // main thread, so the ReadableStream reader stops draining, TCP backpressure
  // fills the kernel send buffer, and the server's per-token write blocks —
  // which stalls the decode loop and tanks tok/s. One render per frame is
  // enough for smooth streaming and keeps the socket drained.
  let rafGen = 0;
  let rafPending = false;
  const scheduleRender = () => {
    if (rafPending) return;
    rafPending = true;
    const gen = rafGen;
    requestAnimationFrame(() => {
      rafPending = false;
      if (gen !== rafGen) return; // superseded by a finalize / abort / error
      body.innerHTML = renderMarkdown(acc) + '<span class="cursor"></span>';
      scrollDown();
    });
  };
  const cancelRender = () => { rafGen++; rafPending = false; };

  try {
    const resp = await fetch("/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(getSettings()),
      signal: controller.signal,
    });
    if (!resp.ok || !resp.body) {
      const txt = await resp.text().catch(() => "");
      throw new Error("HTTP " + resp.status + " " + txt);
    }

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      let sep;
      while ((sep = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, sep);
        buf = buf.slice(sep + 2);
        const line = chunk.trim();
        if (!line.startsWith("data:")) continue;
        const payload = line.slice(5).trim();
        if (payload === "[DONE]") { buf = ""; break; }
        let ev;
        try { ev = JSON.parse(payload); } catch { continue; }
        const delta = ev?.choices?.[0]?.delta;
        if (delta?.content) {
          if (ntok === 0) t0 = performance.now();
          acc += delta.content;
          ntok += 1;
          scheduleRender();
        }
      }
    }
    cancelRender();
    body.innerHTML = renderMarkdown(acc) || "<p><i>(empty)</i></p>";
    conversation.push({ role: "assistant", content: acc });
    const dtNum = t0 ? (performance.now() - t0) / 1000 : 0;
    const rate = ntok && dtNum > 0 ? (ntok / dtNum).toFixed(1) : "—";
    setStatus(`done · ${ntok} tok · ${dtNum.toFixed(1)}s · ${rate} tok/s`, "");
  } catch (err) {
    if (err.name === "AbortError") {
      cancelRender();
      body.innerHTML = renderMarkdown(acc) + '<p><i>(stopped)</i></p>';
      if (acc) conversation.push({ role: "assistant", content: acc });
      setStatus("stopped");
    } else {
      cancelRender();
      body.innerHTML = '<p style="color:var(--danger)">error: ' + escapeHtml(err.message) + "</p>";
      setStatus("error", "err");
    }
  } finally {
    controller = null;
    sendBtn.disabled = false;
    stopBtn.disabled = true;
    inputEl.focus();
  }
}

inputEl.addEventListener("input", autoGrow);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
sendBtn.addEventListener("click", send);
stopBtn.addEventListener("click", () => controller?.abort());
clearBtn.addEventListener("click", () => {
  if (controller) controller.abort();
  conversation = [];
  messagesEl.innerHTML =
    '<div class="empty" id="empty">' +
    '<div class="logo" aria-hidden="true"></div>' +
    '<span class="empty-kicker">Local inference</span>' +
    "<h2>Ready</h2>" +
    '<p>Begin a conversation with the model running on this machine. <kbd>Enter</kbd> sends, ' +
    '<kbd>Shift+Enter</kbd> adds a new line.</p></div>';
  setStatus("idle");
});
themeBtn.addEventListener("click", () => {
  applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
});

$("temp").addEventListener("input", (e) => ($("temp-hint").textContent = e.target.value));

applyTheme(document.documentElement.dataset.theme || "light", false);
loadModel();
autoGrow();
</script>
</body>
</html>
